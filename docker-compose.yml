version: '3.8'

services:
  # --- INFRASTRUCTURE ---
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: go_multi_api
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: redis_cache
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_mq
    restart: always
    ports:
      - "5672:5672"   # RabbitMQ port
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  # --- BACKEND SERVICES (GOLANG) ---
  api-provider:
    build:
      context: ./go # Sesuaikan dengan folder API Anda
      dockerfile: Dockerfile
    container_name: go_api
    command: ./api-bin
    restart: always
    depends_on:
      - mysql
      - redis
      - rabbitmq
    env_file: .env
    volumes:
      # Mapping folder data untuk seeding
      - /root/data:/app/data:ro 
    ports:
      - "8080:8080"

  # mail-worker:
  #   build:
  #     context: ./go
  #     dockerfile: Dockerfile
  #   container_name: go_worker
  #   command: ./worker-bin
  #   restart: always
  #   depends_on:
  #     - rabbitmq
  #   env_file: .env

  # --- DATA SCRAPER (PYTHON) ---
  scraper:
    build:
      context: ./python # Folder berisi parser.py dan Dockerfile scraper
    container_name: python_scraper
    restart: "no" # Scraper biasanya berjalan sekali/scheduled, bukan always-on
    depends_on:
      - rabbitmq
    env_file: .env
    volumes:
      # Mapping agar hasil scrape tersimpan ke folder data di VPS
      - /root/data:/data 

volumes:
  mysql_data: